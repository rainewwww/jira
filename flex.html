<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>flex demo</title>
  <link rel="stylesheet" href="flex.css">
</head>
<body>

<div class="container">
    horizontal
  <div class="row">
    <div class="box">1</div>
    <div class="box">1</div>
    <div class="box">1</div>
  </div>
</div>

<div class="container">
    column
  <div class="column">
    <div class="box">2</div>
    <div class="box">2</div>
    <div class="box">2</div>
  </div>
</div>

<div class="container">
  <div class="row-center">
    <div class="box">3</div>
    <div class="box">3</div>
  </div>
</div>

<div class="container">
  <div class="space-between">
    <div class="box">4</div>
    <div class="box">4</div>
    <div class="box">4</div>
  </div>
</div>

<div class="container">
  <div class="space-around">
    <div class="box">5</div>
    <div class="box">5</div>
    <div class="box">5</div>
  </div>
</div>

<div class="container">
  <div class="column-center">
    <div class="box">6</div>
    <div class="box">6</div>
    <div class="box">6</div>
  </div>
</div>

<div class="container">
  <div class="wrap">
    <div class="box">7</div>
    <div class="box">7</div>
    <div class="box">7</div>
    <div class="box">7</div>
    <div class="box">7</div>
    <div class="box">7</div>
    <div class="box">7</div>
    <div class="box">7</div>
    <div class="box">7</div>
  </div>
</div>

</body>
</html>
